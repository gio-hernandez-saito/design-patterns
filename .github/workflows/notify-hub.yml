name: Notify Hub

on:
  push:
    branches: [main]
    paths:
      - 'patterns/**'
      - 'docs/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger hub content update
        run: |
          gh api repos/gio-hernandez-saito/zerovoids-hub/dispatches \
            -f event_type=content-updated \
            -f 'client_payload[source]=design-patterns'
        env:
          GH_TOKEN: ${{ secrets.HUB_TRIGGER_TOKEN }}
